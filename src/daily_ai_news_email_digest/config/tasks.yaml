---
hunt_ai_news:
  description: >
    Run exactly 2 searches using the search_ai_news tool to find today's top AI news.

    Search 1: "AI news today healthcare education finance 2026"
    Search 2: "AI news today manufacturing transportation energy robotics 2026"

    Do not run more than 2 searches. Collect all results from both searches.
    For each article note: headline, URL, date, and the short snippet provided.
  expected_output: >
    A list of up to 8 articles from both searches. Each has: headline, URL,
    date, and a one-sentence snippet. Plain text, no formatting.
  agent: ai_news_hunter

curate_ai_news:
  description: >
    Review the 4 articles from the hunter. For each one:
    - Confirm it is a real news story (not a press release or opinion piece)
    - Write one sentence on why this story matters to professionals and businesses

    Keep all 4 if they are credible. Replace any weak story with "no story found
    for this sector" rather than inventing one.
  expected_output: >
    4 curated entries. Each entry: sector name, headline, URL, one significance sentence.
  agent: ai_news_analyst
  context:
    - hunt_ai_news

write_newsletter_copy:
  description: >
    Write newsletter copy for the 4 curated AI news stories.

    Use these sector headings (with emoji):
    🎓 Education & Healthcare | 🏦 Banking & Finance | 🏭 Manufacturing & Transport | 🌟 Emerging Tech

    For each story write:

    1. HEADLINE: The story headline

    2. SUMMARY: 2-3 sentences — what happened, who is involved, and the key result or number

    3. WHY_IT_MATTERS: One sentence starting with "This matters because..."

    4. SOURCE_URL: The exact URL

    Plain text only. No jargon.
  expected_output: >
    Plain text with 4 sector headings. Each story has HEADLINE, SUMMARY (2-3 sentences),
    WHY_IT_MATTERS (1 sentence), SOURCE_URL. Concise and factual.
  agent: newsletter_copywriter
  context:
    - curate_ai_news

design_html_email:
  description: >
    Convert the newsletter copy into a complete Gmail-compatible HTML email.

    CRITICAL RULES:
    - Output raw HTML ONLY — start with <table, no markdown, no code fences
    - Inline CSS on every element — Gmail strips <style> blocks
    - Table-based layout only

    STRUCTURE:

    1. OUTER: <table width="100%" cellpadding="0" cellspacing="0"> with centered
       inner <table width="600" style="background:#ffffff;font-family:Arial,sans-serif">

    2. HEADER: background #1a1a2e, padding 32px 24px, center-aligned.
       "Daily AI News Digest" bold white 26px. Date below in #a0aec0 14px.

    3. INTRO: white bg, padding 14px 24px, center, italic #666666 14px:
       "Your daily roundup of the most impactful AI developments across industries."

    4. FOR EACH STORY:
       - Sector heading: emoji + name, bold #1a1a2e 18px,
         border-left 4px solid #4f46e5, padding-left 12px
       - Headline: bold #1a1a2e 14px
       - Summary: #444444 13px line-height 1.8
       - Why it matters: italic #4f46e5 12px, background #f0f4ff, padding 6px 10px
       - "Read more →" as <a href="URL"> color #4f46e5 12px bold no underline
       - <hr style="border:none;border-top:1px solid #eeeeee;margin:16px 0"> between stories
       - <hr style="border:none;border-top:2px solid #e2e8f0;margin:0"> between sectors

    5. FOOTER: background #f7f7f7, padding 20px 24px, center.
       "Powered by AI News Bot | Delivered daily" in #999999 11px

  expected_output: >
    Raw HTML starting with <table. Inline CSS only. Every story has a "Read more →"
    link. Renders in Gmail at 600px. No markdown, no code fences.
  agent: html_email_designer
  context:
    - write_newsletter_copy

send_email_newsletter:
  description: >
    Send the HTML email newsletter via Gmail using the send email tool.

    - subject: 🤖 Daily AI News Digest — [Today's full date, e.g. July 8, 2026]
    - body: pass the raw HTML from the designer EXACTLY as-is — do not alter it

    The tool sends to all configured recipients automatically.
  expected_output: >
    Confirmation that the email was sent successfully.
  agent: email_delivery_agent
  context:
    - design_html_email
