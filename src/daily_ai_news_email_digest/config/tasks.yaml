---
curate_ai_news:
  description: >
    Here are raw AI news articles fetched from the web today ({today}):

    {search_results}

    Review these articles. Select the 4 best stories — ones that are genuinely
    newsworthy, from credible sources, and have real-world impact.

    For each selected story provide:
    - Sector (e.g. Healthcare, Finance, Education, Manufacturing)
    - Headline
    - URL
    - One sentence on why this story matters
  expected_output: >
    A numbered list of 4 selected stories. Each entry: sector, headline, URL,
    one significance sentence. No markdown headers, plain text.
  agent: ai_news_analyst

write_newsletter_copy:
  description: >
    Take the 4 curated stories and write newsletter copy for each one.

    For each story write:

    SECTOR: [sector name with emoji — 🎓 Education, 🏥 Healthcare, 🏦 Finance,
    🏭 Manufacturing, 🚗 Transportation, 🌾 Agriculture, 🌟 Emerging Tech, etc.]

    HEADLINE: [the story headline]

    SUMMARY: [2-3 sentences — what happened, who is involved, the key result or number]

    WHY_IT_MATTERS: [one sentence starting with "This matters because..."]

    SOURCE_URL: [the exact URL]

    Write in plain English. No jargon. No markdown formatting.
  expected_output: >
    4 stories, each with SECTOR, HEADLINE, SUMMARY (2-3 sentences),
    WHY_IT_MATTERS (1 sentence), SOURCE_URL. Plain text only.
  agent: newsletter_copywriter
  context:
    - curate_ai_news

design_html_email:
  description: >
    Convert the newsletter copy into a complete Gmail-compatible HTML email.

    CRITICAL: Output raw HTML ONLY. Start with <table — no markdown, no code fences,
    no explanation text before or after. Just the HTML.

    Use inline CSS on every element (Gmail strips <style> blocks).
    Use table-based layout only.

    STRUCTURE:

    1. OUTER WRAPPER:
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4">
      <tr><td align="center">
        <table width="600" cellpadding="0" cellspacing="0"
               style="background:#ffffff;font-family:Arial,Helvetica,sans-serif">

    2. HEADER ROW:
    <tr><td style="background:#1a1a2e;padding:32px 24px;text-align:center">
      <p style="color:#ffffff;font-size:26px;font-weight:bold;margin:0">
        Daily AI News Digest</p>
      <p style="color:#a0aec0;font-size:14px;margin:8px 0 0">
        [today's date]</p>
    </td></tr>

    3. INTRO ROW:
    <tr><td style="padding:16px 24px;text-align:center">
      <p style="color:#666666;font-size:14px;font-style:italic;margin:0">
        Your daily roundup of the most impactful AI developments across industries.
      </p>
    </td></tr>

    4. FOR EACH STORY (one <tr><td> per story):
    <tr><td style="padding:20px 24px">
      <p style="color:#4f46e5;font-size:13px;font-weight:bold;
                border-left:4px solid #4f46e5;padding-left:10px;margin:0 0 12px">
        [SECTOR with emoji]</p>
      <p style="color:#1a1a2e;font-size:15px;font-weight:bold;margin:0 0 8px">
        [HEADLINE]</p>
      <p style="color:#444444;font-size:13px;line-height:1.7;margin:0 0 8px">
        [SUMMARY]</p>
      <p style="color:#4f46e5;font-size:12px;font-style:italic;
                background:#f0f4ff;padding:6px 10px;margin:0 0 10px">
        💡 [WHY_IT_MATTERS]</p>
      <a href="[SOURCE_URL]"
         style="color:#4f46e5;font-size:12px;font-weight:bold;text-decoration:none">
        Read more →</a>
    </td></tr>
    <tr><td><hr style="border:none;border-top:1px solid #eeeeee;margin:0"></td></tr>

    5. FOOTER ROW:
    <tr><td style="background:#f7f7f7;padding:20px 24px;text-align:center">
      <p style="color:#999999;font-size:11px;margin:0">
        Powered by AI News Bot | Delivered daily</p>
    </td></tr>

    Close all tags: </table></td></tr></table>

  expected_output: >
    Raw HTML starting with <table. No preamble, no code fences, no markdown.
    Inline CSS only. Every story has a "Read more →" link. Closes all HTML tags.
  agent: html_email_designer
  context:
    - write_newsletter_copy
